name: Build iperf3 for Windows

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          base-devel
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-openssl

    - name: Download iperf3 source
      shell: msys2 {0}
      run: |
        curl -L https://github.com/esnet/iperf/releases/download/3.20/iperf-3.20.tar.gz -o iperf-3.20.tar.gz
        tar -xzf iperf-3.20.tar.gz

    - name: Build iperf3
      shell: msys2 {0}
      run: |
        export CC=x86_64-w64-mingw32-gcc
        cd iperf-3.20
        ./configure --host=x86_64-w64-mingw32 LIBS="-lws2_32"
        make -j4

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: iperf3-windows
        path: iperf-3.20/src/iperf3.exe
