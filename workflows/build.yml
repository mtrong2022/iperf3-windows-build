name: Build iperf3 for Windows

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msys2: mingw64
        update: true

    - name: Install dependencies
      run: |
        pacman -Sy --noconfirm mingw-w64-x86_64-gcc mingw-w64-x86_64-make mingw-w64-x86_64-autoconf mingw-w64-x86_64-automake mingw-w64-x86_64-libtool

    - name: Download iperf3 source
      run: |
        curl -L https://github.com/esnet/iperf/releases/download/3.20/iperf-3.20.tar.gz -o iperf-3.20.tar.gz
        tar -xzf iperf-3.20.tar.gz

    - name: Build iperf3
      run: |
        cd iperf-3.20
        ./configure --host=x86_64-w64-mingw32 --build=x86_64-pc-linux-gnu
        make

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: iperf3-windows
        path: iperf-3.20/src/iperf3.exe